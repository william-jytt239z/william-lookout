name: Daily News Aggregation

on:
  schedule:
    # 每天早上 9:00 UTC+8 (即 1:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  aggregate:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Playwright with retry
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_wait_seconds: 30
        command: |
          cd backend
          npm install
          npx playwright install chromium
        shell: pwsh
      
    - name: Run aggregator with retry
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 15
        max_attempts: 3
        retry_wait_seconds: 60
        command: |
          cd backend
          python aggregator.py
        shell: pwsh
        
    - name: Sync data to frontend
      run: |
        # 将抓取的数据同步到前端目录，确保 Vercel 部署时显示最新内容
        Copy-Item -Path "backend/data/top-news.json" -Destination "frontend/public/data/top-news.json" -Force
        Write-Host "✅ 数据已同步到 frontend/public/data/"
      shell: pwsh
      
    - name: Build frontend
      run: |
        # 安装前端依赖并构建
        cd frontend
        npm install
        npm run build
        Write-Host "✅ 前端构建完成"
      shell: pwsh

    - name: Sync dist to root for Vercel deployment
      run: |
        # 将构建好的文件复制到根目录，确保 Vercel 正确部署
        Copy-Item -Path "frontend/dist/*" -Destination "." -Recurse -Force
        Write-Host "✅ 构建文件已同步到根目录"
      shell: pwsh
      
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add backend/data/top-news.json
        git add frontend/public/data/top-news.json
        git add frontend/dist/ -f
        git add assets/ data/ index.html deploy-time.txt vercel.json -f 2>$null || true
        git diff --staged --quiet || git commit -m "🔄 Auto-update news: $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
