name: Daily News Aggregation

on:
  schedule:
    # 每天早上 9:00 UTC+8 (即 1:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  aggregate:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Playwright
      run: |
        cd $env:GITHUB_WORKSPACE/backend
        npm install
        npx playwright install chromium
      working-directory: ./backend
      continue-on-error: true
      
    - name: Run aggregator
      run: |
        cd backend
        python aggregator.py
      working-directory: .
      
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add backend/data/top-news.json
        git diff --staged --quiet || git commit -m "🔄 Auto-update news: $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
